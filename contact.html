<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rack Korea | 문의</title>
  <link rel="stylesheet" href="style.css" />
</head>
  <meta name="description" content="Rack Korea - 전동랙/파렛트랙 설계·제작·설치 및 WMS/WCS 연동 솔루션" />
<meta property="og:title" content="Rack Korea" />
<meta property="og:description" content="창고 공간을 더 많이, 운영은 더 쉽게." />
<body>
  <header>
    <div class="container nav">
      <div class="brand">
        <span>Rack Korea</span>
      </div>
      <nav class="menu">
        <a href="index.html">홈</a>
        <a href="contact.html">문의</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top:26px">
    <h1 style="margin:0 0 10px">문의하기</h1>
    <p style="margin:0 0 18px; color:var(--muted)">
      아래 버튼으로 메일을 보내거나, 메일 주소를 복사해서 Gmail에 붙여넣어도 됩니다.
    </p>

    <div class="card">
      <div class="cta">
        <a class="btn primary"
           href="mailto:master@rackkorea.co.kr?subject=홈페이지%20문의&body=안녕하세요.%0D%0A문의드립니다.%0D%0A%0D%0A-이름:%0D%0A-연락처:%0D%0A-문의내용:%0D%0A">
          메일 보내기
        </a>

        <button class="btn" onclick="copyEmail()">메일 주소 복사</button>
        <span id="copyMsg" style="color:var(--muted)"></span>
      </div>

      <p style="margin-top:14px; color:var(--muted)">메일: <b id="emailText">master@rackkorea.co.kr</b></p>
    </div>

    <script>
      function copyEmail(){
        const email = document.getElementById('emailText').innerText;
        navigator.clipboard.writeText(email).then(()=>{
          document.getElementById('copyMsg').innerText = '복사됨!';
        }).catch(()=>{
          document.getElementById('copyMsg').innerText = '복사 실패(브라우저 권한 확인)';
        });
      }
    </script>

 <footer>
  <div class="container">
    <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;">
      <div>© Rack Korea. All rights reserved.</div>
      <div style="color:var(--muted)">
        문의: <a href="mailto:master@rackkorea.co.kr">master@rackkorea.co.kr</a>
      </div>
    </div>
  </div>
</footer>
  </main>
</body>
</html>
