<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문의하기</title>
</head>
<hr>

<h2>메일 주소 직접 복사</h2>
<p id="emailText">YOUR_EMAIL@domain.com</p>

<button onclick="copyEmail()">메일 주소 복사</button>
<span id="copyMsg" style="margin-left:10px;"></span>

<script>
  function copyEmail() {
    const email = document.getElementById('emailText').innerText;
    navigator.clipboard.writeText(email).then(() => {
      document.getElementById('copyMsg').innerText = '복사됨!';
    }).catch(() => {
      document.getElementById('copyMsg').innerText = '복사 실패(브라우저 권한 확인)';
    });
  }
</script>
  <body>
  <h1>문의하기</h1>

  <p>아래 버튼을 누르면 메일 앱이 열립니다.</p>

  <!-- ✅ 여기가 "메일 보내기" -->
  <p>
    <a href="mailto:master@rackkorea.co.kr?subject=홈페이지%20문의&body=안녕하세요.%0D%0A문의드립니다.%0D%0A%0D%0A-이름:%0D%0A-연락처:%0D%0A-문의내용:%0D%0A">
      메일 보내기
    </a>
  </p>

  <p><a href="index.html">← 메인으로</a></p>
</body>
</html>
