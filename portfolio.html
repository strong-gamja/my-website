<!DOCTYPE html>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .navy-bg { background-color: #0f172a; }
    .navy-text { color: #0f172a; }
    .orange-bg { background-color: #f97316; }
    .orange-text { color: #f97316; }
    .orange-border { border-color: #f97316; }
    .card-hover:hover { transform: translateY(-5px); transition: all 0.25s ease; box-shadow: 0 16px 30px rgba(0,0,0,0.15); }
  </style>
</head>

<body class="bg-gray-50">
  <nav class="fixed w-full z-50 bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-20 items-center">
        <a href="index.html" class="flex items-center">
          <span class="text-2xl font-bold navy-text flex items-center">
            <i class="fas fa-layer-group orange-text mr-2"></i>
            RACK<span class="orange-text">KOREA</span>
          </span>
        </a>
        <div class="hidden md:block">
          <div class="ml-10 flex items-baseline space-x-8">
            <a href="index.html" class="navy-text hover:text-orange-500 font-medium">홈</a>
            <a href="about.html" class="navy-text hover:text-orange-500 font-medium">전동랙 소개</a>

        </div>

      <div class="flex flex-col md:flex-row justify-between items-end mb-10">
        <div>
          <h1 class="text-3xl md:text-4xl font-bold navy-text mb-3">설치 사례</h1>
          <p class="text-gray-600">검증된 현장 적용 사례로 기술력을 확인하세요.</p>

        <a href="contact.html" class="mt-4 md:mt-0 orange-text font-bold hover:underline">

        </a>
      </div>

      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="bg-white rounded-xl overflow-hidden shadow-sm card-hover">
          <img src="assets/photos/case1.png" alt="대표 설치사례" class="w-full h-48 object-cover">
          <div class="p-6">
            <span class="text-xs font-bold orange-text border orange-border px-2 py-1 rounded">대표 사례</span>
            <h3 class="text-xl font-bold navy-text mt-3 mb-2">Rack Korea 설치사례</h3>
            <p class="text-gray-600 text-sm">현장 조건에 맞춘 레이아웃/구동/안전 설계 적용</p>

        </div>

        <div class="bg-white rounded-xl overflow-hidden shadow-sm card-hover">
          <img src="https://images.unsplash.com/photo-1553413077-190dd305871c?auto=format&fit=crop&w=800&q=80" alt="제조/부품" class="w-full h-48 object-cover">
          <div class="p-6">
            <span class="text-xs font-bold orange-text border orange-border px-2 py-1 rounded">제조/부품</span>
            <h3 class="text-xl font-bold navy-text mt-3 mb-2">중량물 창고</h3>
            <p class="text-gray-600 text-sm">강화 프레임·구동 조건 최적화</p>
          </div>
        </div>

        <div class="bg-white rounded-xl overflow-hidden shadow-sm card-hover">
          <img src="https://images.unsplash.com/photo-1587293852726-70cdb56c2866?auto=format&fit=crop&w=800&q=80" alt="냉동/냉장" class="w-full h-48 object-cover">
          <div class="p-6">
            <span class="text-xs font-bold orange-text border orange-border px-2 py-1 rounded">냉동/냉장</span>
            <h3 class="text-xl font-bold navy-text mt-3 mb-2">저온 물류센터</h3>
            <p class="text-gray-600 text-sm">극저온 환경 대응 사양 적용</p>

        <p class="mb-2">Rack Korea | 이메일: master@rackkorea.co.kr</p>

      </div>
    </div>

</html>
